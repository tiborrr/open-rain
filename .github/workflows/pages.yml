name: Deploy Flutter Web to Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env (anonymous mode)
        run: echo "KNMI_WMS_API_KEY=" > .env

      - run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /open-rain/

      - name: Install pandoc (for Markdown → HTML)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Add privacy policy (generate from Markdown)
        run: |
          mkdir -p build/web/privacy-policy
          cp docs/privacy-policy/style.css build/web/privacy-policy/style.css
          pandoc docs/privacy-policy/index.md \
            --from=gfm \
            --standalone \
            --include-in-header=docs/privacy-policy/head-cdn.html \
            --include-before-body=docs/privacy-policy/body-start.html \
            --include-after-body=docs/privacy-policy/body-end.html \
            --css style.css \
            -o build/web/privacy-policy/index.html

      - name: Disable Jekyll processing
        run: touch build/web/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
