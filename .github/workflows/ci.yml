name: CI

on:
  push:
    branches: [ main ]
    tags-ignore: [ '**' ]   # releases are handled in release.yml
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env from secret (empty fallback → anonymous KNMI access)
        run: echo "KNMI_WMS_API_KEY=${KNMI_WMS_API_KEY:-}" > .env
        env:
          KNMI_WMS_API_KEY: ${{ secrets.KNMI_WMS_API_KEY }}

      - run: flutter pub get

      - name: Dart analyze
        run: flutter analyze --fatal-infos

      - name: Unit & widget tests
        run: flutter test test/rate_limiter_test.dart test/widget_test.dart
