name: Release

# Triggers on version tags like 1.0.0, 2.1.3, etc.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# ─── Shared setup ────────────────────────────────────────────────────────────
# Each build job:
#   1. Checks out the repo
#   2. Installs Flutter (stable)
#   3. Creates .env (KNMI key optional — falls back to anonymous access)
#   4. Runs flutter pub get
#   5. Builds the platform artifact
#   6. Uploads the artifact for the release job to attach

env:
  FLUTTER_CHANNEL: stable

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Create .env
        run: echo "KNMI_WMS_API_KEY=${KNMI_WMS_API_KEY:-}" > .env
        env:
          KNMI_WMS_API_KEY: ${{ secrets.KNMI_WMS_API_KEY }}

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/open-rain-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/open-rain-${{ github.ref_name }}.apk

  # ── macOS App ────────────────────────────────────────────────────────────────
  macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Create .env
        run: echo "KNMI_WMS_API_KEY=${KNMI_WMS_API_KEY:-}" > .env
        env:
          KNMI_WMS_API_KEY: ${{ secrets.KNMI_WMS_API_KEY }}

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive .app as zip
        run: |
          mkdir -p dist
          cd build/macos/Build/Products/Release
          zip -r --symlinks \
            "$GITHUB_WORKSPACE/dist/open-rain-${{ github.ref_name }}-macos.zip" \
            flutter_weather.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/open-rain-${{ github.ref_name }}-macos.zip

  # ── Linux Bundle ─────────────────────────────────────────────────────────────
  linux:
    name: Build Linux Bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Create .env
        run: echo "KNMI_WMS_API_KEY=${KNMI_WMS_API_KEY:-}" > .env
        env:
          KNMI_WMS_API_KEY: ${{ secrets.KNMI_WMS_API_KEY }}

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive bundle
        run: |
          mkdir -p dist
          cd build/linux/x64/release/bundle
          zip -r \
            "$GITHUB_WORKSPACE/dist/open-rain-${{ github.ref_name }}-linux.zip" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: dist/open-rain-${{ github.ref_name }}-linux.zip

  # ── Web ──────────────────────────────────────────────────────────────────────
  web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Create .env
        run: echo "KNMI_WMS_API_KEY=${KNMI_WMS_API_KEY:-}" > .env
        env:
          KNMI_WMS_API_KEY: ${{ secrets.KNMI_WMS_API_KEY }}

      - run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Archive web build
        run: |
          mkdir -p dist
          cd build/web
          zip -r \
            "$GITHUB_WORKSPACE/dist/open-rain-${{ github.ref_name }}-web.zip" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/open-rain-${{ github.ref_name }}-web.zip

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [ android, macos, linux, web ]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and attach assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Open Rain ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/open-rain-${{ github.ref_name }}.apk
            artifacts/macos-app/open-rain-${{ github.ref_name }}-macos.zip
            artifacts/linux-bundle/open-rain-${{ github.ref_name }}-linux.zip
            artifacts/web-build/open-rain-${{ github.ref_name }}-web.zip
